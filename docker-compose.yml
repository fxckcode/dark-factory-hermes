services:
  dani_hermes:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dani_hermes
    restart: unless-stopped
    command: gateway run

    ports:
      - "8642:8642"
      - "9120:9120"

    volumes:
      - dani_hermes_data:/opt/data
      # Workspaces (descomentar para montar codigo local):
      # - ./workspaces:/opt/workspaces
      # SSH key para git (descomentar si prefieres SSH sobre GH_TOKEN):
      # - ~/.ssh/id_ed25519:/home/hermes/.ssh/id_ed25519:ro
      # - ~/.ssh/known_hosts:/home/hermes/.ssh/known_hosts:ro

    environment:
      - HERMES_HOME=/opt/data
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9120
      - HERMES_DASHBOARD_INSECURE=1
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8642
      - API_SERVER_KEY=${OPENROUTER_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GH_TOKEN=${GH_TOKEN}
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-fxckcode}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-diego@duran.co}
      - GIT_COMMITTER_NAME=${GIT_COMMITTER_NAME:-fxckcode}
      - GIT_COMMITTER_EMAIL=${GIT_COMMITTER_EMAIL:-diego@duran.co}

    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

volumes:
  dani_hermes_data:
    driver: local
